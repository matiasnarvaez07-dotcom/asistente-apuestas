<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Apuestas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>⚽ Asistente de Apuestas</h1>

    <form method="POST">

        <label>Liga</label>
        <input type="text" name="league" value="{{ form_data.league if form_data else '' }}">

        <label>Casa de apuestas</label>
        <input type="text" name="bookmaker" value="{{ form_data.bookmaker if form_data else '' }}">

        <label>Equipo Local</label>
        <input type="text" name="home_team" value="{{ form_data.home_team if form_data else '' }}">

        <label>Equipo Visitante</label>
        <input type="text" name="away_team" value="{{ form_data.away_team if form_data else '' }}">

        <label>Cuota Local</label>
        <input type="number" step="0.01" name="cuota_home">

        <label>Cuota Empate</label>
        <input type="number" step="0.01" name="cuota_draw">

        <label>Cuota Visitante</label>
        <input type="number" step="0.01" name="cuota_away">

        <button type="submit">Analizar Partido</button>
    </form>

    {% if result %}
    <div class="resultado">
        <h2>Resultado</h2>
        <pre>{{ result }}</pre>
    </div>
    {% endif %}

    <a href="/history">Ver Historial</a>

</div>

</body>
</html>
